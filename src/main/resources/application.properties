spring.application.name=InsuranceSystem
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/Insurance%20System}?stringtype=unspecified
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:123123}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.servlet.multipart.enabled=true
logging.level.com.fasterxml.jackson=INFO
logging.level.org.springframework.web=INFO
logging.level.com.insurancesystem.Model.MapStruct=INFO
logging.level.com.insurancesystem.Services.LabRequestService=INFO
app.jwt.secret=${JWT_SECRET:change-this-super-long-secret-key-at-least-64-characters-long-please-1234567890}
app.jwt.ttl-ms=86400000

# Email Configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:insuranceSystem700@gmail.com}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.notifications.from=Insurance System <no-reply@insurancesystem.com>

# Static Resources Path
spring.web.resources.static-locations=classpath:/static/,file:uploads/

# Application base URL (change in production)
app.base-url=http://localhost:8080

# Actuator Configuration
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
management.endpoint.health.probes.enabled=true
management.health.db.enabled=true
management.info.env.enabled=true
info.app.name=Insurance System
info.app.description=Healthcare Insurance Management System
info.app.version=1.0.0

# OpenAPI/Swagger Configuration
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.operationsSorter=method
